<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Portfolio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://use.typekit.net">
    <link rel="stylesheet" href="https://use.typekit.net/sgy2yyq.css">

    <!-- Icon library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p+1n8aAzFZjZ3qg9tNV8B+zh6nwKg4bxprC/sir4LQWD6ttvTkK0vkpD7z8pugsfpd8u2lybY+7HcV44lLAcHg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Styles -->
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
<link rel="shortcut icon" href="images/favicon.png" type="image/png">
</head>
<body class="resume-screen">
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.svg" alt="logo">
                </a>
            </div>

            <div class="main-menu">
                <ul>
                    <li><a href="index.html">[ design ]</a></li>
                    <li><a href="photo.html">[ photography ]</a></li>
                    <li><a href="index.html#about-section">[ about ]</a></li>
                    <li><a href="resume.html">[ resume ]</a></li>
                    <li><a href="#" id="contact-trigger">[ contact ]</a></li>
                    <li>
                        <a class="btn btn-light" href="#">
                            <i class="fas fa-user"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="sidebar">
        <ul>
            <li>ian teresa-calleja @2026</li>
        </ul>
    </div>

    <main class="resume-page container">
        <div class="resume-layout">
            <div class="resume-intro">
                <h1 class="resume-title">Resume</h1>
                <p class="resume-kicker">One-page resume preview.</p>
                <p class="resume-note">Download the original PDF for full quality.</p>
                <div class="resume-download-wrap">
                    <a class="resume-download-btn" href="images/Ian-Teresa-Resume.pdf" download>Download Resume</a>
                </div>
            </div>

            <div class="resume-viewer-wrap">
                <img
                    class="resume-static-image"
                    src="images/resume-static.png"
                    alt="Ian Teresa-Calleja resume"
                >
            </div>
        </div>
    </main>

    <!-- Contact Modal -->
    <div id="contact-modal" class="contact-modal">
        <div class="contact-modal-content">
            <h2>Get In Touch<span class="contact-modal-close">&times;</span></h2>
            <form id="contact-form" action="https://formspree.io/f/mgonovqe" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
